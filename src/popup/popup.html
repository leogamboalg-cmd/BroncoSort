<!doctype html>
<html>
  <head>
    <title>BroncoSort</title>
    <link rel="stylesheet" href="popup.css" />
  </head>

  <body>
    <div class="popup">
      <h1>BroncoSort</h1>

      <div class="popup-links">
        <a href="https://leogamboalg-cmd.github.io/BroncoSort/" target="_blank">
          Website
        </a>

        <span class="divider"></span>

        <a
          href="https://leogamboalg-cmd.github.io/BroncoSort/request-school.html"
          target="_blank"
        >
          How to request a school
        </a>
      </div>

      <div class="school-search-wrap">
        <input
          id="schoolSearch"
          class="school-input"
          type="text"
          placeholder="Search your school..."
          autocomplete="off"
        />

        <div id="schoolDropdown" class="school-dropdown hidden"></div>
      </div>

      <button id="requestSchoolBtn">Request My School</button>

      <p class="info">
        Help us add support for your school by sending a cleaned-up copy of the
        class registration page layout. Personal information and private account
        details are removed automatically before anything is sent.
      </p>

      <p class="warning">Only use this on class registration/search pages.</p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
